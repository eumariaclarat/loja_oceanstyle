<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Style</title>
<link rel="stylesheet" href="style.css">


</head>
<body>


<header class="top-header">
    <div class="logo-area">
        <h1>Ocean Style</h1>
        <p>Moda com estilo oceano</p>
    </div>
   
    <nav class="top-menu">
        <a href="#novidades">Novidades</a>
        <a href="#biquinis">Biquínis</a>
        <a href="#roupas">Roupas</a>
        <a href="#acessorios">Acessórios</a>
    </nav>


    <div class="top-actions">
        <input type="text" placeholder="Buscar..." class="search">
        <div class="cart-icon">
            <p>Carrinho</p><span id="cart">0</span>
        </div>
    </div>
</header>


<section class="banner">
    <p>Coleção Verão 2026</p>
</section>


<!--2-->
<section class="categorias" id="produtos">
    <h2>Produtos</h2>
   
    <!--Novidades-->
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
            <h3>Camiseta Básica</h3>
            <p class="price">R$ 59,90</p>
            <!--Carrinho-->
            <button onclick="addCart()">Comprar</button>
        </div>
       
        <div class="card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
            <h3>Calça Jeans</h3>
            <p class="price">R$ 129,90</p>
            <!--Carrinho-->
            <button onclick="addCart()">Comprar</button>
        </div>


        <div class="card">
            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
            <h3>Vestido Verão</h3>
            <p class="price">R$ 99,90</p>
            <!--Carrinho-->
            <button onclick="addCart()">Comprar</button>
        </div>
       
        <div class="card">
            <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7">
            <h3>Short Praia</h3>
            <p class="price">R$ 79,90</p>
            <!--Carrinho-->
            <button onclick="addCart()">Comprar</button>
        </div>
       
        <div class="card">
            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
            <h3>Moletom</h3>
            <p class="price">R$ 149,90</p>
            <!--Carrinho-->
            <button onclick="addCart()">Comprar</button>
        </div>
       
        <div class="card">
            <img src="https://images.unsplash.com/photo-1520975922326-8b456906c813">
            <h3>Jaqueta</h3>
            <p class="price">R$ 189,90</p>
            <!--Carrinho-->
            <button onclick="addCart()">Comprar</button>
        </div>
    </div>


<!--2-->
</section>


<footer>Ocean Style - Criado por Intocáveis &copy; 2026</footer>


<script>
let total = 0;


function addCart(){
    total++;
    document.getElementById("cart").innerText = total;
};
</script>


</body>
</html>
